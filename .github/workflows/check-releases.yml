name: Check CPython releases

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max-parallelism:
        description: "Maximum number of build-python.yml runs in flight at once"
        required: false
        default: "10"
        type: string
      dry-run:
        description: "List candidates without dispatching any builds"
        required: false
        default: false
        type: boolean
      force-rebuild:
        description: "Force the build of the specified versions, overwriting them if they already exist"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: bash --noprofile --norc -euxo pipefail {0}

jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      MAX_PARALLELISM: ${{ inputs.max_parallelism || '10' }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
      FORCE_REBUILD: ${{ inputs.force-rebuild && 'true' || 'false' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Enumerate and dispatch
        run: python .github/scripts/check-releases.py
